<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>tamulab 会社別課金管理</title>
<style>
  :root {
    --navy: #1b2a4a;
    --navy-soft: #2a3b5e;
    --ink: #1a1f2e;
    --muted: #6b7488;
    --line: #e2e6ee;
    --bg: #f5f6fa;
    --card: #ffffff;
    --free: #6b7488;
    --paid: #1f8a5b;
    --paid-bg: #e7f5ee;
    --off: #b4332b;
    --off-bg: #fbeae9;
    --accent: #d98a2b;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.6;
  }
  header {
    background: var(--navy); color: #fff; padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; letter-spacing: .02em; }
  header .sub { font-size: 12px; color: #aeb8d0; margin-top: 2px; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 20px 16px 60px; }

  .app-tag {
    display: inline-block; font-size: 12px; font-weight: 700; color: var(--accent);
    background: #fbf1e3; border-radius: 6px; padding: 4px 10px; margin-bottom: 16px;
  }
  .count { font-size: 13px; color: var(--muted); margin: 0 0 16px; }

  /* login */
  #loginView { max-width: 380px; margin: 60px auto; padding: 0 16px; }
  .login-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 28px 24px; }
  .login-card h2 { margin: 0 0 4px; font-size: 18px; }
  .login-card p { margin: 0 0 20px; font-size: 13px; color: var(--muted); }
  label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 5px; font-weight: 600; }
  input {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 1px solid var(--line); border-radius: 8px; background: #fff; -webkit-appearance: none;
  }
  input:focus { outline: 2px solid var(--navy-soft); outline-offset: -1px; border-color: var(--navy-soft); }
  button { font-family: inherit; cursor: pointer; border: none; border-radius: 8px; font-weight: 600; transition: filter .12s; }
  button:active { filter: brightness(.92); }
  .btn-primary { background: var(--navy); color: #fff; padding: 11px 16px; width: 100%; font-size: 15px; margin-top: 18px; }
  .btn-ghost { background: transparent; color: #cdd5e6; border: 1px solid #45527a; padding: 7px 14px; font-size: 13px; }
  .head-actions { display: flex; align-items: center; gap: 10px; }
  .btn-link { color: #fff; background: var(--accent); text-decoration: none; padding: 7px 14px; font-size: 13px; font-weight: 600; border-radius: 8px; white-space: nowrap; }
  .btn-link:active { filter: brightness(.92); }

  /* company cards */
  .co-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; }
  .co-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; gap: 10px; border-bottom: 1px solid var(--line); }
  .co-name { font-weight: 700; font-size: 15px; }
  .co-code { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .06em; }
  .badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .badge-free { background: #eef0f4; color: var(--free); }
  .badge-paid { background: var(--paid-bg); color: var(--paid); }
  .badge-active { background: var(--paid-bg); color: var(--paid); }
  .badge-trial { background: #fbf1e3; color: var(--accent); }
  .badge-suspended { background: var(--off-bg); color: var(--off); }

  .co-body { padding: 14px 16px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field label { margin-top: 0; }
  .field.full { grid-column: 1 / -1; }
  select {
    width: 100%; padding: 10px 12px; font-size: 14px;
    border: 1px solid var(--line); border-radius: 8px; background: #fff; -webkit-appearance: none;
  }
  select:focus { outline: 2px solid var(--navy-soft); outline-offset: -1px; border-color: var(--navy-soft); }
  .row-actions { display: flex; align-items: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .btn-save { background: var(--paid); color: #fff; padding: 9px 18px; font-size: 14px; }
  .saved-note { font-size: 12px; color: var(--paid); margin-left: auto; opacity: 0; transition: opacity .2s; }
  .saved-note.show { opacity: 1; }
  .saved-note.err { color: var(--off); }
  .updated { font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* toggle switch (free/paid) */
  .toggle-paid { display: inline-flex; align-items: center; gap: 10px; font-size: 14px; color: var(--ink); cursor: pointer; user-select: none; font-weight: 600; }
  .switch { position: relative; display: inline-block; width: 50px; height: 28px; flex: 0 0 auto; }
  .switch input { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
  .switch .track { position: absolute; inset: 0; background: #c8ccd6; border-radius: 999px; transition: background .15s; }
  .switch .knob { position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; background: #fff; border-radius: 50%; transition: transform .15s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
  .switch input:checked + .track { background: var(--paid); }
  .switch input:checked + .track + .knob { transform: translateX(22px); }
  .switch-label { min-width: 52px; }
  .switch-on { color: var(--paid); }
  .switch-off { color: var(--free); }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 8px; font-size: 14px; opacity: 0; pointer-events: none; transition: all .25s; z-index: 50; max-width: 90%; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err { background: var(--off); }
  .hidden { display: none !important; }
  .loading { text-align: center; color: var(--muted); padding: 40px 0; font-size: 14px; }
  .err-box { background: var(--off-bg); color: var(--off); border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-bottom: 14px; }
  .empty { text-align: center; color: var(--muted); padding: 40px 16px; font-size: 14px; }
</style>
</head>
<body>

<!-- ログイン -->
<div id="loginView">
  <div class="login-card">
    <h2>会社別 課金管理</h2>
    <p>タイムカードSaaS の会社ごとに、無料／有料を切り替えます。</p>
    <div id="loginErr" class="err-box hidden"></div>
    <label for="email">メールアドレス</label>
    <input id="email" type="email" autocomplete="username" placeholder="tamulab.jp@gmail.com">
    <label for="password">パスワード</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
    <button class="btn-primary" id="loginBtn">ログイン</button>
  </div>
</div>

<!-- 管理 -->
<div id="adminView" class="hidden">
  <header>
    <div>
      <h1>会社別 課金管理</h1>
      <div class="sub" id="whoami"></div>
    </div>
    <div class="head-actions">
      <a class="btn-link" href="admin-x7k2m9.html">アプリ管理へ →</a>
      <a class="btn-link" href="users-x7k2m9.html">ユーザー別へ →</a>
      <button class="btn-ghost" id="logoutBtn">ログアウト</button>
    </div>
  </header>
  <div class="wrap">
    <div id="notAdmin" class="err-box hidden">
      このアカウントは管理者ではありません。変更はできません（表示のみ）。
    </div>
    <div class="app-tag">タイムカードSaaS（tc）</div>
    <div class="count" id="count-tc"></div>
    <div id="coList-tc"><div class="loading">読み込み中…</div></div>

    <div class="app-tag" style="margin-top:28px;">点呼SaaS（tk）</div>
    <div class="count" id="count-tk"></div>
    <div id="coList-tk"><div class="loading">読み込み中…</div></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://hyvjvcdahahrznhujtaz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5dmp2Y2RhaGFocnpuaHVqdGF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTE3MDcsImV4cCI6MjA5NTQyNzcwN30.Zdl8yaFH64xEbiEzi7v8dsd2iu3CKaH96TBNqigJZV4';
const SUPERADMIN_UID = '70e678b4-39db-49cc-a715-1ba5876cb892';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const $ = (id) => document.getElementById(id);

(async function init() {
  const { data } = await sb.auth.getSession();
  if (data.session) showAdmin(data.session.user);
})();

$('loginBtn').addEventListener('click', login);
$('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });

async function login() {
  const email = $('email').value.trim();
  const password = $('password').value;
  $('loginErr').classList.add('hidden');
  if (!email || !password) { showLoginErr('メールアドレスとパスワードを入力してください。'); return; }
  $('loginBtn').textContent = 'ログイン中…'; $('loginBtn').disabled = true;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  $('loginBtn').textContent = 'ログイン'; $('loginBtn').disabled = false;
  if (error) { showLoginErr('ログインに失敗しました。メールアドレスかパスワードをご確認ください。'); return; }
  showAdmin(data.user);
}
function showLoginErr(msg) { $('loginErr').textContent = msg; $('loginErr').classList.remove('hidden'); }

$('logoutBtn').addEventListener('click', async () => { await sb.auth.signOut(); location.reload(); });

async function showAdmin(user) {
  $('loginView').classList.add('hidden');
  $('adminView').classList.remove('hidden');
  $('whoami').textContent = user.email;
  const isAdmin = (user.id === SUPERADMIN_UID);
  if (!isAdmin) $('notAdmin').classList.remove('hidden');
  await loadCompanies('tc', isAdmin);
  await loadCompanies('tk', isAdmin);
}

// app: 'tc' or 'tk'
const APP_CONF = {
  tc: { table: 'tc_companies', rpc: 'admin_set_company_plan',    statusRpc: 'admin_set_company_status',    listId: 'coList-tc', countId: 'count-tc' },
  tk: { table: 'tk_companies', rpc: 'tk_admin_set_company_plan', statusRpc: 'tk_admin_set_company_status', listId: 'coList-tk', countId: 'count-tk' },
};

async function loadCompanies(app, isAdmin) {
  const conf = APP_CONF[app];
  const { data, error } = await sb
    .from(conf.table)
    .select('id, name, company_code, plan, price, employee_limit, status, trial_ends_at, updated_at')
    .order('created_at', { ascending: true });
  if (error) {
    $(conf.listId).innerHTML = '<div class="err-box">読み込みに失敗しました：' + esc(error.message) + '</div>';
    $(conf.countId).textContent = '';
    return;
  }
  if (!data || data.length === 0) {
    $(conf.listId).innerHTML = '<div class="empty">登録されている会社がまだありません。</div>';
    $(conf.countId).textContent = '';
    return;
  }
  const paid = data.filter(c => c.plan === 'paid').length;
  const suspended = data.filter(c => c.status === 'suspended').length;
  $(conf.countId).textContent = `登録 ${data.length} 社（有料 ${paid} 社 / 無料 ${data.length - paid} 社 / 停止中 ${suspended} 社）`;
  $(conf.listId).innerHTML = '';
  data.forEach(c => $(conf.listId).appendChild(buildCard(app, c, isAdmin)));
}

function buildCard(app, c, isAdmin) {
  const card = document.createElement('div');
  card.className = 'co-card';
  const isPaid = c.plan === 'paid';
  const status = c.status || 'active';

  const planBadge = isPaid
    ? `<span class="badge badge-paid">有料</span>`
    : `<span class="badge badge-free">無料</span>`;

  const STATUS_LABEL = { active: '稼働中', trial: 'お試し', suspended: '停止中' };
  const statusBadge = `<span class="badge badge-${esc(status)}">${esc(STATUS_LABEL[status] || status)}</span>`;

  const trialDateVal = toDateInputValue(c.trial_ends_at);

  card.innerHTML = `
    <div class="co-head">
      <div>
        <div class="co-name">${esc(c.name)}</div>
        <div class="co-code">会社コード：${esc(c.company_code)}</div>
      </div>
      <div class="badges">${statusBadge}${planBadge}</div>
    </div>
    <div class="co-body">
      <div class="grid">
        <div class="field">
          <label>料金（円／月）</label>
          <input data-f="price" type="number" inputmode="numeric" value="${numv(c.price)}" ${isAdmin ? '' : 'disabled'}>
        </div>
        <div class="field">
          <label>従業員上限（空欄＝無制限）</label>
          <input data-f="limit" type="number" inputmode="numeric" value="${numv(c.employee_limit)}" ${isAdmin ? '' : 'disabled'}>
        </div>
        <div class="field full">
          <label>プラン</label>
          <label class="toggle-paid">
            <span class="switch">
              <input type="checkbox" data-f="paid" ${isPaid ? 'checked' : ''} ${isAdmin ? '' : 'disabled'}>
              <span class="track"></span>
              <span class="knob"></span>
            </span>
            <span class="switch-label ${isPaid ? 'switch-on' : 'switch-off'}" data-statelabel>${isPaid ? '有料' : '無料'}</span>
          </label>
        </div>
        <div class="field">
          <label>稼働状態</label>
          <select data-f="status" ${isAdmin ? '' : 'disabled'}>
            <option value="active" ${status === 'active' ? 'selected' : ''}>稼働中</option>
            <option value="trial" ${status === 'trial' ? 'selected' : ''}>お試し</option>
            <option value="suspended" ${status === 'suspended' ? 'selected' : ''}>停止中</option>
          </select>
        </div>
        <div class="field" data-trial-field ${status === 'trial' ? '' : 'style="display:none"'}>
          <label>お試し期限</label>
          <input data-f="trial_ends" type="date" value="${trialDateVal}" ${isAdmin ? '' : 'disabled'}>
        </div>
      </div>
      ${isAdmin ? `
      <div class="row-actions">
        <button class="btn-save" data-save>保存</button>
        <span class="saved-note" data-note></span>
      </div>` : ''}
      <div class="updated">最終更新：${fmtDate(c.updated_at)}</div>
    </div>
  `;

  if (isAdmin) {
    const paidInput = card.querySelector('[data-f="paid"]');
    const stateLabel = card.querySelector('[data-statelabel]');
    paidInput.addEventListener('change', () => {
      const on = paidInput.checked;
      stateLabel.textContent = on ? '有料' : '無料';
      stateLabel.classList.toggle('switch-on', on);
      stateLabel.classList.toggle('switch-off', !on);
    });

    const statusSel = card.querySelector('[data-f="status"]');
    const trialField = card.querySelector('[data-trial-field]');
    statusSel.addEventListener('change', () => {
      trialField.style.display = statusSel.value === 'trial' ? '' : 'none';
    });

    card.querySelector('[data-save]').addEventListener('click', () => saveCompany(app, c.id, c.name, card));
  }
  return card;
}

async function saveCompany(app, companyId, companyName, card) {
  const conf = APP_CONF[app];
  const paid = card.querySelector('[data-f="paid"]').checked;
  const priceRaw = card.querySelector('[data-f="price"]').value.trim();
  const limitRaw = card.querySelector('[data-f="limit"]').value.trim();
  const status = card.querySelector('[data-f="status"]').value;
  const trialRaw = card.querySelector('[data-f="trial_ends"]').value;
  const note = card.querySelector('[data-note]');

  const price = priceRaw === '' ? 0 : Number(priceRaw);
  const limit = limitRaw === '' ? null : Number(limitRaw);
  if (priceRaw !== '' && isNaN(price)) { flashNote(note, '料金が数値ではありません', true); return; }
  if (limitRaw !== '' && isNaN(limit)) { flashNote(note, '人数が数値ではありません', true); return; }
  if (status === 'trial' && !trialRaw) { flashNote(note, 'お試し期限を入力してください', true); return; }

  let trialEndsIso = null;
  if (trialRaw) {
    const d = new Date(trialRaw + 'T23:59:59');
    if (!isNaN(d)) trialEndsIso = d.toISOString();
  }

  const btn = card.querySelector('[data-save]');
  btn.disabled = true; btn.textContent = '保存中…';

  const { error: planError } = await sb.rpc(conf.rpc, {
    p_company_id: companyId,
    p_plan: paid ? 'paid' : 'free',
    p_price: price,
    p_limit: limit,
  });

  if (planError) {
    btn.disabled = false; btn.textContent = '保存';
    const msg = /superadmin/.test(planError.message) ? '管理者権限がありません' : '保存に失敗：' + planError.message;
    flashNote(note, msg, true); toast(msg, true); return;
  }

  const { error: statusError } = await sb.rpc(conf.statusRpc, {
    p_company_id: companyId,
    p_status: status,
    p_trial_ends: trialEndsIso,
  });

  btn.disabled = false; btn.textContent = '保存';

  if (statusError) {
    const msg = /superadmin/.test(statusError.message) ? '管理者権限がありません' : '稼働状態の保存に失敗：' + statusError.message;
    flashNote(note, msg, true); toast(msg, true); return;
  }

  flashNote(note, '保存しました');
  toast(`${companyName} を更新しました`);
  const { data } = await sb.auth.getSession();
  const stillAdmin = data.session && data.session.user.id === SUPERADMIN_UID;
  await loadCompanies(app, stillAdmin);
}

function flashNote(el, msg, isErr) {
  el.textContent = msg; el.classList.toggle('err', !!isErr); el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2600);
}
let toastT;
function toast(msg, isErr) {
  const t = $('toast'); t.textContent = msg; t.classList.toggle('err', !!isErr); t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 2600);
}
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function numv(v) { return (v === null || v === undefined || v === '') ? '' : Number(v); }
function toDateInputValue(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return '';
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s); if (isNaN(d)) return esc(s);
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
</script>
</body>
</html>
